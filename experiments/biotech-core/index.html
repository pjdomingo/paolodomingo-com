<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>Helix | BioTech Genomics</title>

    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@200;400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        :root {
            --bg: #f8fafc;
            --text-main: #0f172a;
            --accent: #3b82f6;
            --secondary: #0ea5e9;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg); color: var(--text-main);
            font-family: 'Public Sans', sans-serif; overflow: hidden;
        }

        #webgl-canvas { position: fixed; right: 0; top: 0; z-index: 1; width: 60vw; height: 100vh; pointer-events: none; }

        .ui-panel {
            position: absolute; left: 0; top: 0; width: 45vw; height: 100vh;
            background: linear-gradient(to right, rgba(255,255,255,1) 60%, rgba(255,255,255,0));
            z-index: 2; padding: 5rem; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center;
        }

        h1 { font-size: 5rem; font-weight: 200; letter-spacing: -0.05em; line-height: 0.9; margin: 0 0 2rem 0; color: #1e293b; }
        h1 span { font-weight: 700; color: var(--accent); }
        p { font-size: 1.25rem; font-weight: 200; line-height: 1.6; max-width: 400px; color: #475569; }

        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 4rem; }
        .data-item { padding-top: 1rem; border-top: 1px solid #cbd5e1; }
        .data-num { font-size: 2.5rem; font-weight: 700; color: var(--secondary); letter-spacing: -0.05em; font-family: monospace; }
        .data-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: #64748b; font-weight: 700; }

        .back-link { position: absolute; top: 2rem; left: 5rem; color: #000; text-decoration: none; border: 1px solid #cbd5e1; padding: 0.5rem 1.5rem; border-radius: 30px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 700; transition: all 0.3s; }
        .back-link:hover { background: var(--text-main); color: #fff; border-color: var(--text-main); }
    </style>
</head>
<body>

    <a href="/" class="back-link">Return to Portfolio</a>

    <div class="ui-panel">
        <h1>Surgical<br><span>Precision.</span></h1>
        <p>Real-time molecular genomic sequencing mapped dynamically into the browser rendering engine.</p>
        
        <div class="data-grid">
            <div class="data-item">
                <div class="data-num" id="bp-counter">0</div>
                <div class="data-label">Base Pairs / Sec</div>
            </div>
            <div class="data-item">
                <div class="data-num">99.9%</div>
                <div class="data-label">Accuracy Rate</div>
            </div>
        </div>
    </div>

    <canvas id="webgl-canvas"></canvas>

    <script>
        // Number ticker effect bridging UI and 3D processing speed
        const bp = document.getElementById('bp-counter');
        setInterval(() => {
            bp.innerText = (Math.random() * 80 + 1200).toFixed(0).toLocaleString();
        }, 100);

        // WebGL DNA Setup
        const canvas = document.getElementById('webgl-canvas');
        const scene = new THREE.Scene();
        // Transparent background
        
        const camera = new THREE.PerspectiveCamera(50, (window.innerWidth * 0.6) / window.innerHeight, 0.1, 1000);
        camera.position.z = 25;

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(window.innerWidth * 0.6, window.innerHeight);

        const group = new THREE.Group();
        scene.add(group);

        // Procedural DNA Helix (using TubeGeometry approximation mapping dual waves)
        const particleCount = 400;
        const geometry1 = new THREE.BufferGeometry();
        const geometry2 = new THREE.BufferGeometry();
        const pts1 = new Float32Array(particleCount * 3);
        const pts2 = new Float32Array(particleCount * 3);
        
        // Connections
        const lineGeo = new THREE.BufferGeometry();
        const linePts = new Float32Array(particleCount * 2 * 3); // 2 points per connection

        const radius = 3;
        const heightMultiplier = 0.2;

        for (let i = 0; i < particleCount; i++) {
            const y = (i - particleCount/2) * heightMultiplier;
            const angle = i * 0.2;
            
            // Helix 1
            pts1[i*3] = Math.cos(angle) * radius;
            pts1[i*3+1] = y;
            pts1[i*3+2] = Math.sin(angle) * radius;

            // Helix 2 (offset by PI)
            pts2[i*3] = Math.cos(angle + Math.PI) * radius;
            pts2[i*3+1] = y;
            pts2[i*3+2] = Math.sin(angle + Math.PI) * radius;

            // Connecting lines
            linePts[i*6] = pts1[i*3];
            linePts[i*6+1] = pts1[i*3+1];
            linePts[i*6+2] = pts1[i*3+2];
            
            linePts[i*6+3] = pts2[i*3];
            linePts[i*6+4] = pts2[i*3+1];
            linePts[i*6+5] = pts2[i*3+2];
        }

        geometry1.setAttribute('position', new THREE.BufferAttribute(pts1, 3));
        geometry2.setAttribute('position', new THREE.BufferAttribute(pts2, 3));
        lineGeo.setAttribute('position', new THREE.BufferAttribute(linePts, 3));

        const matNodes = new THREE.PointsMaterial({ color: 0x3b82f6, size: 0.3 });
        const matLines = new THREE.LineBasicMaterial({ color: 0x0ea5e9, transparent: true, opacity: 0.2 });

        group.add(new THREE.Points(geometry1, matNodes));
        group.add(new THREE.Points(geometry2, matNodes));
        group.add(new THREE.LineSegments(lineGeo, matLines));

        // Tilt DNA
        group.rotation.z = Math.PI / 8;

        let mouseX = 0; let mouseY = 0;
        document.addEventListener('mousemove', e => {
            mouseX = (e.clientX / window.innerWidth) - 0.5;
            mouseY = (e.clientY / window.innerHeight) - 0.5;
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            // Continuous rotation
            group.rotation.y = time * 0.5;
            
            // Mouse Parallax
            camera.position.x += (mouseX * 5 - camera.position.x) * 0.05;
            camera.position.y += (-mouseY * 5 - camera.position.y) * 0.05;

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = (window.innerWidth * 0.6) / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth * 0.6, window.innerHeight);
        });
    </script>
</body>
</html>
