<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>Aether | Luxury Estates</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@200;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0a0a0a;
            --text-main: #f5f5f5;
            --gold: #d4af37;
            --serif: 'Cinzel', serif;
            --sans: 'Montserrat', sans-serif;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg); color: var(--text-main);
            font-family: var(--sans); overflow: hidden;
        }

        /* Abstract Full-Screen Image Mask */
        .mask-wrapper {
            position: absolute; right: 0; top: 0; width: 60vw; height: 100vh;
            background: #1a1a1a; pointer-events: none;
            /* Default clip: hide it */
            clip-path: polygon(100% 0, 100% 0, 100% 100%, 100% 100%);
            transition: clip-path 0.8s cubic-bezier(0.7, 0, 0.3, 1);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        /* The mock image inside the mask scales down as it opens */
        .mock-image {
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #d4af37 0%, #332a0d 100%);
            transform: scale(1.2); transition: transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            opacity: 0.8;
        }

        .mask-wrapper.active { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
        .mask-wrapper.active .mock-image { transform: scale(1); }

        .ui-panel {
            position: absolute; left: 0; top: 0; width: 50vw; height: 100vh;
            padding: 5rem 6rem; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center;
            z-index: 10;
        }

        .logo { font-family: var(--serif); font-size: 1.5rem; letter-spacing: 0.2em; color: var(--gold); position: absolute; top: 3rem; left: 6rem; }

        .menu-list { list-style: none; padding: 0; margin: 0; }
        
        .menu-item {
            font-family: var(--serif); font-size: clamp(3rem, 6vw, 5rem);
            margin-bottom: 2rem; cursor: pointer; color: #444; transition: color 0.4s;
            position: relative; display: inline-block;
        }
        
        /* The gold hover text layered exactly on top */
        .menu-item::after {
            content: attr(data-title);
            position: absolute; top: 0; left: 0; color: var(--gold);
            white-space: nowrap; overflow: hidden;
            width: 0%; transition: width 0.6s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .menu-item:hover { color: #555; }
        .menu-item:hover::after { width: 100%; }

        p { font-size: 1rem; color: #888; font-weight: 200; line-height: 1.8; margin-top: 4rem; max-width: 300px; }

        .back-link { position: absolute; bottom: 3rem; left: 6rem; color: #aaa; text-decoration: none; border-bottom: 1px solid #aaa; padding-bottom: 4px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.2em; transition: color 0.3s; }
        .back-link:hover { color: var(--gold); border-color: var(--gold); }

        #toast {
            position: fixed; bottom: 3rem; right: 6rem;
            color: var(--gold); border: 1px solid var(--gold);
            padding: 1rem 2rem; font-family: var(--serif);
            font-size: 0.9rem; letter-spacing: 0.15em;
            background: rgba(10,10,10,0.9);
            opacity: 0; pointer-events: none;
            transition: opacity 0.4s ease, transform 0.4s ease;
            transform: translateY(10px);
            z-index: 999;
        }
        #toast.show { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="logo">AETHER</div>

    <div class="mask-wrapper" id="image-mask">
        <div class="mock-image"></div>
    </div>

    <div class="ui-panel">
        <ul class="menu-list">
            <li class="menu-item" data-title="Penthouses">Penthouses</li><br>
            <li class="menu-item" data-title="Estates">Estates</li><br>
            <li class="menu-item" data-title="Private Islands">Private Islands</li>
        </ul>
        
        <p>Curating the absolute highest tier of autonomous luxury living across the globe.</p>
    </div>

    <a href="/" class="back-link">Return to Portfolio</a>

    <script>
        const mask = document.getElementById('image-mask');
        const items = document.querySelectorAll('.menu-item');
        const toast = document.getElementById('toast');
        let toastTimer;

        items.forEach(item => {
            item.addEventListener('mouseenter', () => {
                mask.classList.add('active'); // Slide mask open
            });
            item.addEventListener('mouseleave', () => {
                mask.classList.remove('active'); // Slide closed
            });
            item.addEventListener('click', () => {
                clearTimeout(toastTimer);
                toast.textContent = item.dataset.title.toUpperCase() + ' — Coming Soon. This is a design concept.';
                toast.classList.add('show');
                toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
            });
        });
    </script>

    <div id="toast"></div>
</body>
</html>
