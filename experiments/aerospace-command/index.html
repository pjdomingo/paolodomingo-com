<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>ORION | Aerospace Command</title>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --bg: #050505;
            --grid: #111;
            --accent: #f97316; /* Warning Orange */
            --accent-dim: rgba(249, 115, 22, 0.2);
            --text-main: #f5f5f5;
            --mono: 'JetBrains Mono', monospace;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg); color: var(--text-main);
            font-family: var(--mono); overflow: hidden;
            display: grid; grid-template-columns: 350px 1fr 350px;
            height: 100vh;
            background-image: linear-gradient(var(--grid) 1px, transparent 1px),
                              linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Sidebars */
        aside {
            border-right: 1px solid #222;
            padding: 2rem; display: flex; flex-direction: column;
            background: rgba(5,5,5,0.8); backdrop-filter: blur(10px);
            z-index: 10;
        }
        aside.right { border-right: none; border-left: 1px solid #222; }

        .logo { font-size: 2rem; font-weight: 800; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 3rem; }
        .module { margin-bottom: 2rem; }
        .mod-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.2em; color: #666; margin-bottom: 1rem; border-bottom: 1px solid #333; padding-bottom: 0.5rem; }
        
        .data-row { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.75rem; }
        .data-val { color: var(--accent); }

        .sys-warning { color: #ef4444; border: 1px solid #ef4444; padding: 0.5rem; font-size: 0.8rem; text-align: center; margin-top: 1rem; animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 0% { background: transparent; } 50% { background: rgba(239, 68, 68, 0.2); } 100% { background: transparent; } }

        /* Center Dashboard */
        main { position: relative; z-index: 5; }
        #webgl-canvas { width: 100%; height: 100%; }

        /* Targeting Reticle Overlay */
        .reticle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 500px; height: 500px; border: 1px dashed var(--accent-dim); border-radius: 50%; pointer-events: none;
            display: flex; justify-content: center; align-items: center;
        }
        .reticle::before, .reticle::after {
            content: ""; position: absolute; background: var(--accent-dim);
        }
        .reticle::before { width: 100%; height: 1px; }
        .reticle::after { width: 1px; height: 100%; }

        .back-link { position: absolute; bottom: 2rem; left: 2rem; color: #fff; text-decoration: none; border: 1px solid rgba(255,255,255,0.2); padding: 0.5rem 1.5rem; border-radius: 30px; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; transition: background 0.3s, color 0.3s; z-index: 100; }
        .back-link:hover { background: #fff; color: #000; }

        .btn { border: 1px solid var(--accent); background: transparent; color: var(--accent); width: 100%; padding: 1rem; cursor: pointer; font-family: var(--mono); text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.1em; transition: background 0.2s; margin-bottom: 1rem; }
        .btn:hover { background: var(--accent); color: #000; }
    </style>
</head>
<body>

    <aside>
        <div class="logo">ORION_</div>
        
        <div class="module">
            <div class="mod-title">Orbital Mechanics</div>
            <div class="data-row"><span>Altitude</span><span class="data-val" id="alt">408.2 KM</span></div>
            <div class="data-row"><span>Velocity</span><span class="data-val">27,580 km/h</span></div>
            <div class="data-row"><span>Inclination</span><span class="data-val">51.6°</span></div>
        </div>

        <div class="module">
            <div class="mod-title">Life Support</div>
            <div class="data-row"><span>O2 Reserves</span><span class="data-val">98.2%</span></div>
            <div class="data-row"><span>Cabin Temp</span><span class="data-val">22.4°C</span></div>
            <div class="sys-warning">THERMAL RADIATOR ALIGNMENT SUB-OPTIMAL</div>
        </div>

        <a href="/" class="back-link">Return to Base</a>
    </aside>

    <main>
        <div class="reticle"></div>
        <canvas id="webgl-canvas"></canvas>
    </main>

    <aside class="right">
        <div class="module">
            <div class="mod-title">Command Override</div>
            <button class="btn" id="btn-thrust">Engage Thrusters</button>
            <button class="btn" id="btn-scan">Deep Space Scan</button>
        </div>

        <div class="module" id="log-module">
            <div class="mod-title">System Log</div>
            <div class="data-row" style="color:#666">> Telemetry initialized.</div>
            <div class="data-row" style="color:#666">> Awaiting command input...</div>
        </div>
    </aside>

    <script>
        // Log updating logic
        const btnThrust = document.getElementById('btn-thrust');
        const btnScan = document.getElementById('btn-scan');
        const logModule = document.getElementById('log-module');

        btnThrust.addEventListener('click', () => {
            logModule.innerHTML += `<div class="data-row" style="color:var(--accent)">> PROGRADE BURN ENGAGED</div>`;
        });

        const scanResponses = [
            '> INITIATING DEEP SPACE SCAN...',
            '> SCANNING SECTOR 7-GAMMA...',
            '> ANOMALY DETECTED AT 2.4 AU',
            '> SIGNAL STRENGTH: 0.003 nT',
            '> [DESIGN CONCEPT — NO LIVE DATA]'
        ];
        let scanIndex = 0;
        btnScan.addEventListener('click', () => {
            const msg = scanResponses[scanIndex % scanResponses.length];
            const color = msg.includes('DESIGN CONCEPT') ? '#666' : 'var(--accent)';
            logModule.innerHTML += `<div class="data-row" style="color:${color}">${msg}</div>`;
            scanIndex++;
        });

        // Altitude jitter logic
        const altText = document.getElementById('alt');
        setInterval(() => {
            const jitter = (Math.random() * 0.4 - 0.2).toFixed(2);
            altText.innerText = (408.2 + parseFloat(jitter)).toFixed(2) + " KM";
        }, 1000);

        // WebGL Wireframe Globe
        const canvas = document.getElementById('webgl-canvas');
        const mainEl = document.querySelector('main');
        
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, mainEl.clientWidth / mainEl.clientHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
        renderer.setSize(mainEl.clientWidth, mainEl.clientHeight);

        const group = new THREE.Group();
        scene.add(group);

        // 1. High res wireframe sphere
        const geoSphere = new THREE.IcosahedronGeometry(2, 6); // High detail
        const matSphere = new THREE.MeshBasicMaterial({ color: 0xf97316, wireframe: true, transparent: true, opacity: 0.15 });
        const sphere = new THREE.Mesh(geoSphere, matSphere);
        group.add(sphere);

        // 2. Orbital Ring
        const geoRing = new THREE.TorusGeometry(2.4, 0.005, 16, 100);
        const matRing = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
        const ring = new THREE.Mesh(geoRing, matRing);
        ring.rotation.x = Math.PI / 2;
        group.add(ring);

        // 3. Small orbital satellite
        const geoSat = new THREE.SphereGeometry(0.05, 8, 8);
        const matSat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const satellite = new THREE.Mesh(geoSat, matSat);
        satellite.position.x = 2.4; // Sits on ring
        ring.add(satellite);

        // Mouse rotation
        let mouseX = 0; let mouseY = 0;
        document.addEventListener('mousemove', e => {
            mouseX = (e.clientX / window.innerWidth) - 0.5;
            mouseY = (e.clientY / window.innerHeight) - 0.5;
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();

            sphere.rotation.y = time * 0.05;
            ring.rotation.z = time * 0.2; // Satellite orbits

            // Interactive Parallax
            group.rotation.x += (mouseY * 1 - group.rotation.x) * 0.05;
            group.rotation.y += (mouseX * 1 - group.rotation.y) * 0.05;

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = mainEl.clientWidth / mainEl.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(mainEl.clientWidth, mainEl.clientHeight);
        });
    </script>
</body>
</html>
