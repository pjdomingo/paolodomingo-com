<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>Neo | The Future of Banking</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #020617; /* Very dark slate/navy */
            --accent: #10b981; /* Electric green */
            --accent-glow: rgba(16, 185, 129, 0.4);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg); color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
        }

        /* Ambient Glows */
        .ambient-glow {
            position: absolute; border-radius: 50%; filter: blur(120px); z-index: 0; pointer-events: none;
        }
        .glow-1 { width: 500px; height: 500px; background: rgba(16, 185, 129, 0.15); top: -100px; right: -100px; }
        .glow-2 { width: 400px; height: 400px; background: rgba(59, 130, 246, 0.15); bottom: -100px; left: -100px; }

        .container {
            width: 100%; max-width: 1200px; padding: 0 2rem; position: relative; z-index: 2;
            display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center;
        }

        /* Typography */
        h1 { font-size: clamp(3rem, 6vw, 5rem); font-weight: 900; line-height: 1.1; letter-spacing: -0.04em; margin: 0 0 1.5rem 0; }
        h1 span { color: var(--accent); }
        p { font-size: 1.25rem; color: var(--text-muted); line-height: 1.6; margin: 0 0 3rem 0; max-width: 450px; font-weight: 300; }

        .cta-btn {
            display: inline-block; padding: 1rem 2.5rem; background: var(--accent); color: var(--bg);
            border-radius: 30px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em;
            text-decoration: none; transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 30px var(--accent-glow);
        }
        .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 0 50px var(--accent-glow); }

        /* 3D Card Scene */
        .scene {
            width: 100%; height: 600px; display: flex; align-items: center; justify-content: center;
            perspective: 1500px; /* Crucial for 3D depth */
        }
        
        .card-wrapper {
            width: 320px; height: 500px; position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s;
        }

        .credit-card {
            width: 100%; height: 100%; position: absolute;
            border-radius: 24px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.01));
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            padding: 2.5rem; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: space-between;
            overflow: hidden;
            transform-style: preserve-3d; /* Allows internal elements to float */
        }

        /* Card internals float above the glass */
        .card-chip { width: 50px; height: 40px; background: linear-gradient(to bottom right, #e2e8f0, #94a3b8); border-radius: 8px; transform: translateZ(20px); }
        .card-logo { font-size: 2rem; font-weight: 900; letter-spacing: -0.05em; transform: translateZ(30px); }
        .card-logo span { color: var(--accent); }
        
        .card-number { font-size: 1.5rem; letter-spacing: 0.15em; font-family: monospace; transform: translateZ(25px); margin-top: auto; margin-bottom: 2rem; }
        
        .card-footer { display: flex; justify-content: space-between; transform: translateZ(20px); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.7); }

        /* Glossy reflection layer purely via CSS */
        .gloss { position: absolute; inset: 0; background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.1) 25%, transparent 30%); pointer-events: none; }

        /* Secondary floating card */
        .card-bg {
            position: absolute;
            width: 280px; height: 440px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--accent), #059669);
            top: 30px; left: 80px;
            transform: translateZ(-100px) rotateZ(10deg);
            opacity: 0.5;
            filter: blur(4px);
        }

        .back-link { position: absolute; top: 2rem; left: 2rem; color: #fff; text-decoration: none; border: 1px solid rgba(255,255,255,0.2); padding: 0.5rem 1.5rem; border-radius: 30px; transition: background 0.3s, color 0.3s; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.1em; z-index: 100; }
        .back-link:hover { background: #fff; color: #000; }

        #toast {
            position: fixed; bottom: 2.5rem; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--accent); color: var(--bg);
            padding: 1rem 2rem; border-radius: 30px;
            font-weight: 900; font-size: 0.9rem; letter-spacing: 0.05em;
            box-shadow: 0 0 30px var(--accent-glow);
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s ease;
            z-index: 999; text-align: center;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; text-align: center; gap: 2rem; }
            h1 { font-size: 3rem; }
            p { margin: 0 auto 3rem auto; }
            .scene { height: 400px; }
        }
    </style>
</head>
<body>

    <a href="/" class="back-link">Back to Portfolio</a>

    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <div class="container">
        
        <div class="text-content">
            <h1>Banking without<br><span>boundaries.</span></h1>
            <p>Experience the absolute edge of financial technology. Advanced spatial analytics, zero transaction fees, and cryptographic security.</p>
            <a href="#" class="cta-btn" id="cta-btn">Claim Your Card</a>
        </div>

        <div class="scene">
            <div class="card-wrapper" id="card">
                
                <div class="card-bg"></div>

                <div class="credit-card">
                    <div class="gloss" id="gloss"></div>
                    <div class="card-logo">NEO<span>.</span></div>
                    <div class="card-chip"></div>
                    <div class="card-number">•••• •••• •••• 5928</div>
                    <div class="card-footer">
                        <div>PAUL DOMINGO</div>
                        <div>12/30</div>
                    </div>
                </div>

            </div>
        </div>

    </div>

    <script>
        const card = document.getElementById('card');
        const gloss = document.getElementById('gloss');

        // Advanced mathematical mouse tracking for massive 3D rotation
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            // Calculate percentage from center (-1 to 1)
            const percentX = (x - centerX) / centerX;
            const percentY = (y - centerY) / centerY;
            
            // Increase multiplier for extreme 3D effect
            const rotateX = percentY * -25; 
            const rotateY = percentX * 25;
            
            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            
            // Move the glossy reflection dynamically based on mouse
            gloss.style.background = `linear-gradient(${105 + (percentX * 45)}deg, transparent 20%, rgba(255,255,255,0.1) ${25 + (percentX*10)}%, transparent 30%)`;
        });

        // Reset on leave
        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateX(0deg) rotateY(0deg)`;
            gloss.style.background = `linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.1) 25%, transparent 30%)`;
        });

        // Toast for CTA button
        const ctaBtn = document.getElementById('cta-btn');
        const toast = document.getElementById('toast');
        let toastTimer;
        ctaBtn.addEventListener('click', (e) => {
            e.preventDefault();
            clearTimeout(toastTimer);
            toast.classList.add('show');
            toastTimer = setTimeout(() => toast.classList.remove('show'), 3500);
        });
    </script>

    <div id="toast">We'll be in touch! This is a design prototype.</div>
</body>
</html>
