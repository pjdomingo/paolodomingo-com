<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>Nexus | Immersive XR Gaming</title>

    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #09090b;
            --accent: #d946ef; /* Magenta */
            --accent-alt: #06b6d4; /* Cyan */
            --text-main: #f4f4f5;
            --mono: 'Share Tech Mono', monospace;
            --display: 'Syncopate', sans-serif;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg); color: var(--text-main);
            font-family: var(--mono); overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh;
        }

        /* CRT Grid Background */
        .crt-bg {
            position: absolute; inset: 0; z-index: 0; pointer-events: none;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            transform: perspective(600px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
        }
        @keyframes gridMove {
            from { background-position: 0 0; }
            to { background-position: 0 300px; }
        }

        /* Scanline Overlay */
        .scanlines {
            position: absolute; inset: 0; z-index: 100; pointer-events: none;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 4px;
        }

        .content { position: relative; z-index: 10; text-align: center; }

        .cipher-header {
            font-family: var(--display);
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.1em; margin: 0; cursor: pointer;
            position: relative;
        }
        
        /* CSS Glitch Effect */
        .glitch-active { animation: glitchSkew 1s infinite alternate-reverse; }
        .glitch-active::before, .glitch-active::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }
        .glitch-active::before { left: 4px; text-shadow: -2px 0 var(--accent-alt); clip-path: polygon(0 0, 100% 0, 100% 30%, 0 30%); animation: glitchAnim1 2s infinite linear alternate-reverse; }
        .glitch-active::after { left: -4px; text-shadow: -2px 0 var(--accent); clip-path: polygon(0 70%, 100% 70%, 100% 100%, 0 100%); animation: glitchAnim2 3s infinite linear alternate-reverse; }

        @keyframes glitchSkew { 0% { transform: skew(0deg); } 20% { transform: skew(-20deg); } 21% { transform: skew(0deg); } }
        @keyframes glitchAnim1 { 0% { clip-path: polygon(0 20%, 100% 20%, 100% 30%, 0 30%); } 100% { clip-path: polygon(0 80%, 100% 80%, 100% 90%, 0 90%); } }
        @keyframes glitchAnim2 { 0% { clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%); } 100% { clip-path: polygon(0 10%, 100% 10%, 100% 30%, 0 30%); } }

        p { font-size: 1.2rem; color: #a1a1aa; margin-top: 2rem; max-width: 500px; text-align: center; }

        .btn-wrapper { margin-top: 4rem; }
        .play-btn {
            background: transparent; color: var(--accent-alt); border: 1px solid var(--accent-alt);
            padding: 1rem 3rem; font-family: var(--mono); font-size: 1.2rem; text-transform: uppercase;
            letter-spacing: 0.2em; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
        }
        .play-btn:hover { background: var(--accent-alt); color: var(--bg); box-shadow: 0 0 20px var(--accent-alt); }

        .back-link { position: absolute; top: 2rem; left: 2rem; color: #fff; text-decoration: none; border: 1px solid rgba(255,255,255,0.2); padding: 0.5rem 1.5rem; border-radius: 30px; font-size: 0.7rem; font-family: sans-serif; letter-spacing: 0.1em; z-index: 100; text-transform: uppercase; }
        .back-link:hover { background: #fff; color: #000; }
    </style>
</head>
<body>

    <a href="/" class="back-link">Return to Base</a>

    <div class="crt-bg"></div>
    <div class="scanlines"></div>

    <div class="content">
        <!-- Target for Cipher Script -->
        <h1 class="cipher-header" data-value="NEXUS_XR" id="cipher">NEXUS_XR</h1>
        <p>Direct neural-link injection into the metaverse. A completely untethered WebGL spatial gaming experience.</p>
        
        <div class="btn-wrapper">
            <button class="play-btn" id="init-btn">Initialize</button>
        </div>
    </div>

    <script>
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*";
        
        // Custom Cipher Text Decryption Algorithm
        function scrambleText(element) {
            let iteration = 0;
            clearInterval(element.interval);
            const originalText = element.dataset.value;
            
            // Add CSS Glitch
            element.classList.add('glitch-active');
            element.setAttribute('data-text', originalText);

            element.interval = setInterval(() => {
                element.innerText = originalText.split("")
                    .map((letter, index) => {
                        if(index < iteration) {
                            return originalText[index];
                        }
                        return letters[Math.floor(Math.random() * 42)];
                    }).join("");
                
                if(iteration >= originalText.length) {
                    clearInterval(element.interval);
                    element.classList.remove('glitch-active');
                }
                
                // Increase iteration by fractions for slower decypt
                iteration += 1 / 3; 
            }, 30);
        }

        const title = document.getElementById('cipher');
        title.addEventListener('mouseover', () => scrambleText(title));

        const btn = document.getElementById('init-btn');
        btn.addEventListener('mouseover', () => {
            btn.dataset.value = "CONNECTING...";
            scrambleText(btn);
        });
        btn.addEventListener('mouseleave', () => {
            btn.dataset.value = "INITIALIZE";
            scrambleText(btn);
        });

        // Run on load
        setTimeout(() => scrambleText(title), 500);

        // Initialize button — boot sequence
        const bootLines = [
            "> SYSTEM BOOT INITIATED...",
            "> LOADING NEURAL LINK DRIVERS...",
            "> ESTABLISHING METAVERSE UPLINK...",
            "> CALIBRATING XR HAPTICS...",
            "> ACCESS GRANTED. WELCOME, OPERATIVE.",
            "> [THIS IS A DESIGN CONCEPT — NOT A LIVE PRODUCT]"
        ];

        const initBtn = document.getElementById('init-btn');
        let booting = false;

        // Create log element
        const log = document.createElement('div');
        log.style.cssText = 'margin-top:2rem;text-align:left;font-size:0.85rem;color:var(--accent-alt);min-height:1.2em;max-width:500px;';
        initBtn.parentElement.appendChild(log);

        initBtn.addEventListener('click', () => {
            if (booting) return;
            booting = true;
            log.innerHTML = '';
            let i = 0;
            function nextLine() {
                if (i >= bootLines.length) { booting = false; return; }
                const line = document.createElement('div');
                line.style.opacity = '0';
                line.style.transition = 'opacity 0.3s';
                line.textContent = bootLines[i];
                if (i === bootLines.length - 1) line.style.color = 'var(--accent)';
                log.appendChild(line);
                requestAnimationFrame(() => { line.style.opacity = '1'; });
                i++;
                setTimeout(nextLine, 400);
            }
            nextLine();
            scrambleText(title);
        });

    </script>
</body>
</html>
